<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heuristic Labs — Case Studies</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #111009;
    --surface:   #1a1814;
    --surface2:  #211f1a;
    --surface3:  #272420;
    --text:      #e8e2d9;
    --muted:     #7a7060;
    --muted2:    #a09880;
    --bronze:    #b5763a;
    --bronze-lt: #c98a4a;
    --border:    #2a2720;
    --border2:   #332f28;
    --active-bg: #1e1c17;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 80px 32px 100px;
  }

  /* ── Section header ── */
  .section-header {
    max-width: 1160px;
    margin: 0 auto 56px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }

  .header-left { max-width: 580px; }

  .eyebrow {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bronze);
    background: rgba(181,118,58,0.1);
    border: 1px solid rgba(181,118,58,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4.5vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 16px;
  }
  .headline em { font-style: italic; color: var(--bronze); }

  .subhead {
    font-size: 0.92rem;
    font-weight: 300;
    color: var(--muted2);
    line-height: 1.75;
    max-width: 420px;
  }

  /* ── Main layout ── */
  .layout {
    max-width: 1160px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .nav-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  }
  @media (max-width: 480px) {
    .nav-list { grid-template-columns: 1fr; }
  }

  /* ── Left nav ── */
  .nav-panel {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 32px;
  }

  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .nav-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }
  .nav-item.active {
    background: var(--active-bg);
    border-color: rgba(181,118,58,0.3);
  }

  .nav-num {
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    min-width: 18px;
    transition: color 0.2s;
  }
  .nav-item.active .nav-num { color: var(--bronze); }

  .nav-icon {
    width: 16px; height: 16px;
    color: var(--muted);
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .nav-item.active .nav-icon,
  .nav-item:hover .nav-icon { color: var(--bronze); }

  .nav-text {
    flex: 1;
  }
  .nav-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted2);
    transition: color 0.2s;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .nav-item.active .nav-title { color: var(--text); }
  .nav-item:hover .nav-title  { color: var(--text); }

  .nav-sub {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.3;
    transition: color 0.2s;
  }
  .nav-item:hover .nav-sub { color: var(--muted2); }

  .nav-arrow {
    font-size: 0.75rem;
    color: var(--bronze);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .nav-item.active .nav-arrow,
  .nav-item:hover .nav-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── Right preview panel ── */
  .preview {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    overflow: hidden;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }

  /* image area */
  .preview-img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
    background: var(--surface3);
    position: relative;
    overflow: hidden;
  }

  /* placeholder gradient when no image */
  .preview-img-placeholder {
    width: 100%;
    height: 300px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .preview-img-placeholder .gradient-bg {
    position: absolute;
    inset: 0;
    transition: opacity 0.4s ease;
  }
  .preview-img-placeholder .img-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .preview-img-placeholder .img-icon {
    width: 40px; height: 40px;
    color: rgba(255,255,255,0.2);
  }
  .preview-img-placeholder .img-text {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }

  /* content area */
  .preview-body {
    padding: 32px 36px 36px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .preview-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .meta-industry {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--bronze);
  }
  .meta-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--muted);
  }
  .meta-duration {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .preview-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 800;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 14px;
    transition: color 0.3s;
  }

  .preview-desc {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--muted2);
    line-height: 1.75;
    margin-bottom: 28px;
    max-width: 560px;
  }

  /* stats row */
  .stats-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .stat {
    flex: 1;
    padding: 16px 20px;
    border-right: 1px solid var(--border2);
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    font-style: italic;
    color: var(--bronze);
    display: block;
    line-height: 1;
    margin-bottom: 5px;
  }
  .stat-lbl {
    font-size: 0.67rem;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.3;
  }

  /* CTA */
  .preview-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bronze);
    color: #fff;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
    align-self: flex-start;
  }
  .preview-cta:hover {
    background: var(--bronze-lt);
    transform: translateY(-1px);
  }
  .preview-cta .cta-arrow {
    transition: transform 0.2s ease;
  }
  .preview-cta:hover .cta-arrow { transform: translateX(3px); }

  /* transition animation */
  .preview-body,
  .preview-img-placeholder {
    animation: none;
  }
  .fade-in {
    animation: fadeSwitch 0.35s ease forwards;
  }
  @keyframes fadeSwitch {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="section-header">
  <div class="header-left">
    <span class="eyebrow">Case Studies</span>
    <h2 class="headline">We've built systems<br>for <em>global enterprises.</em></h2>
    <p class="subhead">Practical AI implementations across industries — each capturing the challenge, approach, and measurable business impact.</p>
  </div>
</div>

<div class="layout">

  <!-- Left nav -->
  <nav class="nav-panel">
    <div class="nav-list" id="nav-list"></div>
  </nav>

  <!-- Right preview -->
  <div class="preview" id="preview">
    <div class="preview-img-placeholder" id="preview-img">
      <div class="gradient-bg" id="preview-gradient"></div>
      <div class="img-label">
        <svg class="img-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span class="img-text" id="preview-img-label">Construction</span>
      </div>
    </div>
    <div class="preview-body" id="preview-body">
      <!-- injected by JS -->
    </div>
  </div>

</div>

<script>
const cases = [
  {
    industry: 'Construction',
    sub: 'Real-time safety monitoring',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
    duration: '12 Weeks',
    title: 'Real-Time Safety Monitoring',
    desc: 'Large construction sites lacked real-time PPE compliance monitoring and depended on manual supervision with post-incident reporting. We deployed a vision AI system detecting violations in real time across 40+ camera feeds.',
    stats: [
      { val: '95%', lbl: 'PPE detection accuracy' },
      { val: '40%', lbl: 'Reduction in incidents' },
      { val: '40+', lbl: 'Camera feeds monitored' },
    ],
    gradient: 'linear-gradient(135deg, #0d2133 0%, #1a3a4a 40%, #0a1a20 100%)',
  },
  {
    industry: 'E-Commerce',
    sub: 'Personalised product discovery',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
    duration: '8 Weeks',
    title: 'AI-Powered Product Discovery',
    desc: 'A D2C brand with 50,000+ SKUs had poor search relevance and high drop-off at the discovery stage. We built a hybrid semantic search and recommendation engine that understands shopper intent, not just keywords.',
    stats: [
      { val: '3.2×', lbl: 'Increase in search conversion' },
      { val: '28%', lbl: 'Higher average order value' },
      { val: '50k+', lbl: 'SKUs indexed semantically' },
    ],
    gradient: 'linear-gradient(135deg, #1a1020 0%, #2d1a3a 40%, #0f0a18 100%)',
  },
  {
    industry: 'D2C Brand',
    sub: 'Multilingual voice agent',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
    duration: '10 Weeks',
    title: 'Multilingual Voice Sales Agent',
    desc: 'A consumer brand expanding across South Asia needed 24/7 sales support in 6 languages without scaling headcount. We built a voice agent handling product queries, order status, and upsells across Hindi, Tamil, Bengali and more.',
    stats: [
      { val: '6', lbl: 'Languages supported' },
      { val: '24/7', lbl: 'Coverage with zero agents' },
      { val: '62%', lbl: 'Reduction in support cost' },
    ],
    gradient: 'linear-gradient(135deg, #0f1a10 0%, #1a2e1a 40%, #0a150a 100%)',
  },
  {
    industry: 'Enterprise Search',
    sub: 'Internal knowledge retrieval',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    duration: '6 Weeks',
    title: 'Enterprise Knowledge Search',
    desc: 'A 10,000-person enterprise had critical knowledge locked in 400GB of unstructured documents, PDFs, and legacy wikis. We built a hybrid RAG system that surfaces precise answers with source citations in under 2 seconds.',
    stats: [
      { val: '<2s', lbl: 'Average query response time' },
      { val: '400GB', lbl: 'Documents indexed' },
      { val: '88%', lbl: 'Answer accuracy on eval set' },
    ],
    gradient: 'linear-gradient(135deg, #12100a 0%, #2a2010 40%, #181408 100%)',
  },
  {
    industry: 'Legal',
    sub: 'Contract review automation',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    duration: '9 Weeks',
    title: 'Automated Contract Review',
    desc: 'A legal services firm spent 40+ hours per week on routine contract review. We built an AI pipeline that flags risk clauses, extracts key terms, and generates a structured review summary — cutting review time by 70%.',
    stats: [
      { val: '70%', lbl: 'Reduction in review time' },
      { val: '40hrs', lbl: 'Saved per week' },
      { val: '99%', lbl: 'Clause detection recall' },
    ],
    gradient: 'linear-gradient(135deg, #0a0a14 0%, #14142a 40%, #080810 100%)',
  },
  {
    industry: 'Fintech',
    sub: 'Fraud detection & explainability',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
    duration: '14 Weeks',
    title: 'Real-Time Fraud Detection',
    desc: 'A payment platform needed fraud detection that was both accurate and explainable to regulators. We built an ensemble model with LLM-generated explanations for every flagged transaction, meeting RBI audit requirements.',
    stats: [
      { val: '0.3%', lbl: 'False positive rate' },
      { val: '97%', lbl: 'Fraud detection accuracy' },
      { val: '100%', lbl: 'RBI audit compliance' },
    ],
    gradient: 'linear-gradient(135deg, #0a1210 0%, #102018 40%, #080e0c 100%)',
  },
  {
    industry: 'AI Governance',
    sub: 'Compliance & risk framework',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
    duration: '8 Weeks',
    title: 'AI Governance Framework',
    desc: 'A regulated enterprise deploying AI across 5 business units had no unified governance framework. We designed and implemented an AI risk taxonomy, model registry, and audit trail system aligned to EU AI Act requirements.',
    stats: [
      { val: '5', lbl: 'Business units covered' },
      { val: '100%', lbl: 'Model registry coverage' },
      { val: 'EU AI', lbl: 'Act aligned' },
    ],
    gradient: 'linear-gradient(135deg, #0a0e14 0%, #10182a 40%, #080c10 100%)',
  },
  {
    industry: 'Automotive',
    sub: 'Predictive maintenance AI',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`,
    duration: '16 Weeks',
    title: 'Predictive Maintenance System',
    desc: 'An automotive manufacturer faced unplanned downtime costing ₹2Cr+ per incident. We built a sensor data pipeline with anomaly detection models that predict equipment failure 72 hours before occurrence.',
    stats: [
      { val: '72hr', lbl: 'Failure prediction window' },
      { val: '85%', lbl: 'Downtime reduction' },
      { val: '₹2Cr', lbl: 'Saved per incident avoided' },
    ],
    gradient: 'linear-gradient(135deg, #14100a 0%, #2a1e08 40%, #100c06 100%)',
  },
];

let active = 0;

function renderNav() {
  const list = document.getElementById('nav-list');
  list.innerHTML = '';
  cases.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (i === active ? ' active' : '');
    el.innerHTML = `
      <span class="nav-num">0${i + 1}</span>
      <span class="nav-icon">${c.icon}</span>
      <span class="nav-text">
        <span class="nav-title">${c.industry}</span>
        <span class="nav-sub">${c.sub}</span>
      </span>
      <span class="nav-arrow">→</span>
    `;
    el.addEventListener('click', () => {
      active = i;
      renderNav();
      renderPreview(true);
    });
    list.appendChild(el);
  });
}

function renderPreview(animate = false) {
  const c = cases[active];

  // gradient
  document.getElementById('preview-gradient').style.background = c.gradient;
  document.getElementById('preview-img-label').textContent = c.industry;

  const body = document.getElementById('preview-body');
  body.innerHTML = `
    <div class="preview-meta">
      <span class="meta-industry">${c.industry}</span>
      <span class="meta-dot"></span>
      <span class="meta-duration">${c.duration}</span>
    </div>
    <div class="preview-title">${c.title}</div>
    <div class="preview-desc">${c.desc}</div>
    <div class="stats-row">
      ${c.stats.map(s => `
        <div class="stat">
          <span class="stat-val">${s.val}</span>
          <span class="stat-lbl">${s.lbl}</span>
        </div>
      `).join('')}
    </div>
    <button class="preview-cta">Explore Case Study <span class="cta-arrow">→</span></button>
  `;

  if (animate) {
    body.classList.remove('fade-in');
    void body.offsetWidth;
    body.classList.add('fade-in');
  }
}

renderNav();
renderPreview(false);
</script>
</body>
</html>
